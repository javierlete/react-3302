<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>React sin build</title>

    <!-- React y ReactDOM desde CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para interpretar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .titulo {
            color: darkgray;
        }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- Tu código React con JSX -->
    <script type="text/babel">
      function App() {
        return (
          <div>
            <Titulo texto="Hola a todos" />
            <Titulo texto="¿Qué tal lo lleváis?" />
            <p>Esto funciona solo con etiquetas &lt;script&gt;.</p>
          </div>
        );
      }

      function Titulo(props) {
        return <h1 className="titulo" style={{backgroundColor: 'black'}}>
                {props.texto}
            </h1>;
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
